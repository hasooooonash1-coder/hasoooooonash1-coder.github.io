<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي - قيد التحديث</title>
    <style>
        :root {
            --primary-color: #ff9800; /* لون برتقالي للمسات الجمالية */
            --bg-color: #121212; /* خلفية داكنة */
            --text-color: #ffffff;
            --card-bg: #1e1e1e; /* لون البطاقة الداكن */
            --whatsapp-color: #25D366; /* لون الواتساب الرسمي */
            --whatsapp-hover: #128C7E;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid #333;
        }
        .image-container {
            margin-bottom: 25px;
        }
        .image-placeholder {
            width: 100px;
            height: 100px;
            background-color: #2a2a2a;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            border: 2px solid var(--primary-color);
        }
        .image-placeholder svg {
            width: 50px;
            height: 50px;
            fill: var(--primary-color);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #ffffff;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--whatsapp-color);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 17px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
            width: 100%;
        }
        .btn-whatsapp:hover {
            background-color: var(--whatsapp-hover);
            transform: translateY(-2px);
        }
        .btn-whatsapp:active {
            transform: translateY(0);
        }
        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <!-- أيقونة احترافية ونظيفة -->
            <div class="image-placeholder">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A3,3 0 0,0 9,9A3,3 0 0,0 12,12A3,3 0 0,0 15,9A3,3 0 0,0 12,6M12,14C9.33,14 4,15.33 4,18V20H20V18C20,15.33 14,14 12,14Z" />
                </svg>
            </div>
        </div>
        <h1>مرحباً بكم في موقعنا الرسمي</h1>
        <p>الموقع حالياً قيد التحديث البرمجي الشامل لإطلاق المنصة الجديدة. لمتابعة آخر الأخبار، العروض، والتحديثات اليومية الحصرية مباشرة، يسعدنا انضمامكم إلى قناتنا الرسمية على الواتساب عبر الزر أدناه.</p>
        
        <!-- استبدل الرابط أدناه برابط قناة الواتساب الخاصة بك -->
        <a href="https://whatsapp.com/channel/0029Vb7yLdeAzNbvF78dLl3T" class="btn-whatsapp" target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="fill: white; stroke: none;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.746.953 3.71 1.458 5.704 1.459h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            اضغط هنا للانضمام إلى القناة
        </a>
        
        <div class="footer">
            &copy; 2026 جميع الحقوق محفوظة للمنصة.
        </div>
    </div>
</body>
</html>
